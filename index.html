<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./main.css">
  <link rel="shortcut icon" href="./asset/images/favicon.ico">
  <script src="./dist/index.js" type="module"></script>
  <title>Chinese Character Alchemy</title>
</head>
<body>
  <div id="game-canvas-wrapper">
    <canvas id="game-canvas">

    </canvas>
  </div>
  <div id="list">
    <div id="list-title">
      List
    </div>
    <div id="list-wrapper">
      <!-- List items here -->
    </div>
  </div>
  <div id="save-space" hover-info="Save current workspace">
    S
  </div>
  <div id="gold-toggle" hover-info="Hide completed characters" onclick="this.classList.toggle('activated')">
    G
  </div>
  <div id="info" hover-info="+ First load can take a moment while data and fonts load&#10;+ Merge 2-5 characters to create a new character&#10;+ Every 5 new characters unlocks a tier 1 character&#10;+ Right-click deletes an item&#10;+ Middle-click decomposes a character&#10;+ Double-click duplicates an item&#10;+ There are thousands of characters to discover">
    ?
  </div>
  <div id="collection-toggle" onclick="document.getElementById('collections').classList.toggle('hidden')">
    C
  </div>
  <div id="collections" class="hidden">
    <div id="collection-list">

    </div>
    <div id="collection-display-wrapper">
      <div id="collection-display">
        <div id="collection-display__placeholder">
          &lt;&lt; Click collection name to see the list
        </div>
      </div>
    </div>
  </div>
</body>
</html>
